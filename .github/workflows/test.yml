name: Install and test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install pre-commit
        run: uv pip install pre-commit
        env:
          UV_SYSTEM_PYTHON: 1

      - name: run pre-commit
        run: pre-commit run --all-files --color always --show-diff-on-failure

  # Single source of truth for supported Python versions: the
  # "Programming Language :: Python :: 3.x" classifiers in pyproject.toml.
  # Bump the classifiers + requires-python and the test matrix follows.
  #
  # The full Python range runs on Linux (cheap, plentiful runners); macOS and
  # Windows only run the oldest + newest Python (the edges that catch
  # platform-specific compile breaks). This keeps the scarce macOS runners to
  # 2 jobs instead of one per Python version, which otherwise queue for ages.
  # macOS is pinned to macos-15 (not macos-latest): during GitHub's macOS-26
  # migration, macos-latest jobs are starved by concurrency limits.
  generate-matrix:
    name: generate test matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      include: ${{ steps.set.outputs.include }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - id: set
        shell: bash
        run: |
          INCLUDE=$(python - <<'PY'
          import json, pathlib, re, tomllib

          classifiers = tomllib.loads(
              pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["classifiers"]
          pat = re.compile(r"^Programming Language :: Python :: (3\.\d+)$")
          versions = sorted(
              {m.group(1) for c in classifiers if (m := pat.match(c))},
              key=lambda v: int(v.split(".")[1]),
          )
          assert versions, "no 'Programming Language :: Python :: 3.x' classifiers found"
          edges = sorted({versions[0], versions[-1]}, key=lambda v: int(v.split(".")[1]))
          include = (
              [{"os": "ubuntu-latest", "python-version": v} for v in versions]
              + [{"os": "macos-15", "python-version": v} for v in edges]
              + [{"os": "windows-latest", "python-version": v} for v in edges]
          )
          print(json.dumps(include))
          PY
          )
          echo "Matrix: $INCLUDE"
          echo "include=$INCLUDE" >> "$GITHUB_OUTPUT"

  test:
    name: test (${{ matrix.python-version }}, ${{ matrix.os }})
    needs: [code-quality, generate-matrix]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.include) }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      # Build isolation lets the frontend read [build-system].requires
      # (Cython, numpy, setuptools), so the .pyx compiles identically on every
      # OS. Do NOT add --no-build-isolation: it drops the build env and breaks
      # the Windows wheel build (missing bdist_wheel).
      - name: Install package with test dependencies
        run: uv pip install -e ".[dev]"
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Show dependencies
        run: uv pip list
        env:
          UV_SYSTEM_PYTHON: 1

      # --pyargs imports the installed package by name rather than collecting
      # from the source tree, so tests run against what actually got built.
      - name: Run tests
        run: python -m pytest --pyargs sktime_cython -v
