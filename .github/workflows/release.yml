name: Build wheels and publish to PyPI

on:
  # Publish on pushing a version tag, e.g. `git tag v0.1.0 && git push --tags`.
  # The tag must match the version in pyproject.toml (checked below). Use a
  # PEP 440 pre-release version (e.g. 0.1.0rc1 -> tag v0.1.0rc1) to publish a
  # pre-release that `pip install` ignores unless `--pre` is passed.
  push:
    tags:
      - "v*"

# Never run two publishes for the same tag concurrently.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check_tag:
    name: Check tag
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - shell: bash
        run: |
          python -m pip install -q packaging
          # Validate the tag is a real PEP 440 version (packaging is PyPI's own
          # parser) and matches pyproject.toml. Version() compares normalized,
          # so v1.0 == 1.0.0 and 1.0.0rc1 is accepted as a pre-release.
          GH_TAG_NAME="${GITHUB_REF_NAME#v}"
          python - "$GH_TAG_NAME" <<'PY'
          import pathlib, sys, tomllib
          from packaging.version import InvalidVersion, Version

          tag = sys.argv[1]
          pyproj = tomllib.loads(
              pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]
          try:
              tag_v = Version(tag)
          except InvalidVersion:
              sys.exit(f"::error::Tag '{tag}' is not a valid PEP 440 version.")
          if tag_v != Version(pyproj):
              sys.exit(
                  f"::error::Tag ({tag}) does not match "
                  f"pyproject.toml version ({pyproj})."
              )
          PY

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    needs: check_tag
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Pin explicit macOS images (not macos-latest, which rolls forward to
        # macOS 26) so release wheels are built on a fixed, reproducible OS:
        #   macos-15-intel -> x86_64, macos-15 -> arm64 (Apple Silicon).
        # Both build natively, so cibuildwheel tests each wheel on its target
        # arch. cibuildwheel picks the CPython versions from requires-python in
        # pyproject.toml (cp310-cp314).
        os: [ubuntu-latest, windows-latest, macos-15-intel, macos-15]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    needs: check_tag
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: uv pip install "cython>=3.0" "numpy>=1.21" setuptools build
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Build sdist
        run: python -m build --sdist --outdir dist/

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_wheels:
    name: Upload wheels to PyPI
    runs-on: ubuntu-latest
    needs: [build_wheels, build_sdist]

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
