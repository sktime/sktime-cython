name: Install and test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: repository checkout step
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: python environment step
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install pre-commit
        run: uv pip install pre-commit
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Get changed files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tr '\n' ' ')
          echo "CHANGED_FILES=${CHANGED_FILES}" >> $GITHUB_ENV

      - name: Print changed files
        run: |
          echo "Changed files:" && echo "$CHANGED_FILES" | tr ' ' '\n'

      - name: Run pre-commit on changed files
        run: |
          if [ -n "$CHANGED_FILES" ]; then
            pre-commit run --color always --files $CHANGED_FILES --show-diff-on-failure
          else
            echo "No changed files to check."
          fi

  test-nosoftdeps:
    name: test-nosoftdeps
    needs: code-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install Cython and build dependencies
        run: uv pip install "cython>=3.0" "numpy>=1.21" setuptools
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Install package with dev dependencies
        run: uv pip install -e ".[dev]" --no-build-isolation
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Show dependencies
        run: uv pip list
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Run tests
        run: python -m pytest sktime_cython/ -v

  test-full:
    name: test (${{ matrix.python-version }}, ${{ matrix.os }})
    needs: test-nosoftdeps
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install Cython and build dependencies
        run: uv pip install "cython>=3.0" "numpy>=1.21" setuptools
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Install package with dev dependencies
        run: uv pip install -e ".[dev]" --no-build-isolation
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Show dependencies
        run: uv pip list
        env:
          UV_SYSTEM_PYTHON: 1

      - name: Run tests
        run: python -m pytest sktime_cython/ -v
